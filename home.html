<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub issue tracker</title>

    <!-- tailwind + daisyUi -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

    <!-- icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body>

    <header>
        <div class="navbar bg-base-100 shadow-sm px-6">
            <div class="flex-1">
                <a href="" class="flex items-center gap-2">
                    <img class="w-10" src="./assets/github-logo.png" alt="">
                    <span class="text-lg font-semibold">GitHub Issues Tracker</span>
                </a>
            </div>

            <div class="flex flex-col sm:flex-row items-center gap-3">
                <input id="input-search" type="text" placeholder="&#x1F50D;Search issues..." class="input rounded-lg w-32 md:w-auto" />

                <button id="btn-search" class="btn btn-primary">
                    <i class="fa-solid fa-plus"></i> New Issue </button>
            </div>
        </div>
    </header>

    <!-- button section -->
    <section class="w-full sm:w-9/12 lg:w-10/12 mx-auto bg-[#fffdfd] mt-0 md:mt-[55px] shadow-sm rounded-xl p-8">
        <div class="flex gap-[8px]">
            <button onclick="
            buttonStyle('all');
            
          " id="allbutton" class="stausBtn btn md:w-[120px] btn-primary">
                All
            </button>
            <button onclick="
            buttonStyle('open');
            
          " id="openbutton" class="stausBtn btn md:w-[120px]">
                Open
            </button>
            <button onclick="
            buttonStyle('closed');
            
          " id="closedbutton" class="stausBtn btn md:w-[120px]">
                Closed
            </button>
        </div>
    </section>

    <!-- loading -->
     <section id="spinner" class="flex justify-center items-center py-10 hidden">
        <span class="loading loading-bars loading-xl"></span>
     </section>

    <!-- toggling section -->
    <section class="">
        <div class="sm:w-9/12 lg:w-10/12 mx-auto bg-[#fffdfd]  md:mt-[55px] shadow-sm rounded-xl">
            <div class="card-body flex flex-row items-center justify-between">

                <!-- Left Section -->
                <div class="flex items-start gap-4">
                    <!-- Icon -->
                    <div class="bg-primary/10  p-1 rounded-full">
                        <img src="./assets/Aperture.png" alt="">
                    </div>

                    <!-- Text -->
                    <div>
                        <h2 class="font-semibold text-lg"> <span id="count">0</span> Issues</h2>
                        <p class=" text-[#64748B]">
                            Track and manage your project issues
                        </p>
                    </div>
                </div>

                <!-- Right Section -->
                <div class="flex items-center gap-4 text-sm">

                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-[#00A96E] "></span>
                        <span>Open</span>
                    </div>

                    <div class="flex items-center gap-2">
                        <span class="w-3 h-3 rounded-full bg-[#A855F7]"></span>
                        <span>Closed</span>
                    </div>

                </div>

            </div>
        </div>
    </section>
      
    <!-- card section -->
    <section id="word-container" class="bg-[#fffdfd] p-6 w-10/12 mx-auto grid grid-cols-4 gap-5 rounded-lg">

    </section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->

    <dialog id="word_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="details-container" class=""></div>
            
    </dialog>



    <script src="./script/card.js"></script>
</body>

</html>
